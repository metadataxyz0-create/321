<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Fragment • Offer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#121519; --card:#1f242b; --accent:#00a2ff; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: var(--bg);
            color: #fff;
            line-height: 1.4;
            padding-bottom: 60px;
        }
        header {
            background: #1a1e24;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a2f38;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-svg { width: 110px; }
        .search-container {
            flex: 1;
            position: relative;
        }
        .search-container svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
        }
        .search {
            width: 100%;
            background: #2a2f38;
            border: none;
            border-radius: 9999px;
            padding: 10px 16px 10px 44px;
            color: #fff;
            font-size: 15px;
        }
        .connect-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #272c34;
            color: #fff;
            border: none;
            border-radius: 9999px;
            padding: 8px 16px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
        }
        .connect-ton { background: #00a2ff; color: #121519; }
        .number-block {
            text-align: center;
            padding: 24px 16px 16px;
        }
        .number {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .status-badge {
            background: #22c55e;
            color: #121519;
            font-size: 13px;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 9999px;
            display: inline-block;
        }
        .subscribe {
            text-align: right;
            padding: 0 16px 12px;
            color: #00a2ff;
            font-size: 15px;
        }
        .content {
            padding: 0 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .card {
            flex: 1;
            min-width: 280px;
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
        }
        .offer-text { font-size: 15px; line-height: 1.5; }
        .accept-btn {
            background: #00a2ff;
            color: white;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 9999px;
            margin: 24px 16px 32px;
            box-shadow: 0 4px 20px rgba(0,162,255,0.3);
        }
        .section { margin: 0 16px 32px; }
        .section-title { font-size: 20px; font-weight: 500; margin-bottom: 12px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
        }
        th { background: #272c34; padding: 14px 12px; text-align: left; font-weight: 500; font-size: 14px; color: #aaa; }
        td { padding: 14px 12px; border-top: 1px solid #2a2f38; }
        .ton-value { font-weight: 700; color: #ffd951; display: flex; align-items: center; gap: 4px; }
        .wallet { color: #00a2ff; word-break: break-all; }
        .empty { text-align: center; padding: 40px; color: #666; font-style: italic; }
        @media (max-width: 640px) { .content { flex-direction: column; } }
    </style>
</head>
