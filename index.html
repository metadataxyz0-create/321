<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Fragment • Offer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#121519; --card:#1f242b; --accent:#4db2ff; --muted:#8c9aa9; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: var(--bg);
            color: #fff;
            line-height: 1.4;
            padding-bottom: 40px;
        }
        header {
            background: #1a1e24;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a2f38;
        }
        .logo { width: 32px; height: 32px; }
        .search-container { flex: 1; position: relative; }
        .search-container svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; }
        .search { width: 100%; background: #2a2f38; border: none; border-radius: 9999px; padding: 10px 16px 10px 44px; color: #fff; font-size: 15px; }
        .hamburger { background: none; border: none; }

        .number-line { padding: 20px 16px 12px; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .number { font-size: 28px; font-weight: 700; line-height: 36px; }
        .claimed { background: #22c55e; color: #121519; font-size: 13px; font-weight: 700; padding: 4px 14px; border-radius: 9999px; }

        .what-card, .collectible-card {
            margin: 0 16px 20px;
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
        }
        .what-card h3 { font-size: 14px; font-weight: 700; color: #8c9aa9; margin-bottom: 12px; }
        .offer-text { font-size: 13px; line-height: 19px; }
        .how-link { color: #4db2ff; font-size: 14px; margin-top: 12px; display: block; }

        .accept-btn {
            background: #248bda;
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            width: calc(100% - 32px);
            margin: 0 16px 24px;
            padding: 16px;
            border: none;
            border-radius: 9999px;
        }

        .collectible-card h3 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .collectible-card p { font-size: 14px; color: #8c9aa9; line-height: 18px; }

        .subscribe { text-align: center; color: #4db2ff; font-size: 14px; margin-bottom: 28px; }

        .section-title { font-size: 22px; font-weight: 700; line-height: 36px; padding: 0 16px; margin-bottom: 12px; }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; margin: 0 16px 32px; }
        th { background: #272c34; padding: 14px 12px; font-size: 14px; font-weight: 700; color: #8c9aa9; text-align: left; }
        td { padding: 14px 12px; border-top: 1px solid #2a2f38; }
        .ton-value { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .date-text { font-size: 14px; color: #8c9aa9; }
        .wallet { font-size: 14px; color: #4db2ff; }

        .debug { margin: 20px; padding: 15px; background: #272c34; border-radius: 8px; font-size: 13px; color: #ffd951; display: none; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <!-- Маленький белый треугольник (твой SVG) -->
        <svg class="logo" height="512" viewBox="0 0 512 512" width="512" xmlns="http://www.w3.org/2000/svg">
            <path d="M 126.3 153.6 L 252 209.2 C 255.2 210.7 259.2 210.5 264.2 208.2 L 388 153.5 C 394.6 151.1 390.9 143.7 385.7 144.5 L 129.1 143.4 C 121.9 143.7 119.9 150.9 126.3 153.6 Z M 116.2 182.1 L 234.6 366.1 C 238.3 372.1 247.7 368.7 247.4 363.3 L 247.2 237.1 C 247.1 230 245.3 228.4 240.8 226.5 L 122.4 173.8 C 118.1 171.4 112.3 175.4 116.2 182.1 Z M 267.5 234.8 L 267.8 361.8 C 267.9 370.3 276.4 371.9 281.3 364.7 L 384.2 205.3 L 386.4 201.9 L 388.3 199 L 388.3 198.9 L 399.1 182.3 C 402.4 176.8 397.2 170.5 389.4 174.2 L 272 227.1 C 271.8 227.2 271.6 227.3 271.4 227.4 C 269.9 228.3 268.9 229.2 268.4 230.3 C 267.7 231.5 267.5 233 267.5 234.8 Z" fill="#fff" fill-rule="evenodd"/>
        </svg>

        <div class="search-container">
            <svg height="20" viewBox="0 0 16 20" width="16" xmlns="http://www.w3.org/2000/svg">
                <g fill="none" fill-rule="evenodd" stroke="#8494a3" stroke-width="1.41"><ellipse cx="8.82" cy="8.35" rx="4.48" ry="4.64"/><path d="m2 16 3.77-3.89" stroke-linecap="round"/></g>
            </svg>
            <input type="text" class="search" placeholder="Search phone numbers..." disabled>
        </div>

        <button class="hamburger">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><line x1="3" y1="6" x2="21" y2="6" stroke="#fff" stroke-width="3" stroke-linecap="round"/><line x1="3" y1="12" x2="21" y2="12" stroke="#fff" stroke-width="3" stroke-linecap="round"/><line x1="3" y1="18" x2="21" y2="18" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>
        </button>
    </header>

    <div id="debug" class="debug"></div>

    <div class="number-line">
        <span class="number" id="number-display">+888 0000 0000</span>
        <span class="claimed">Claimed</span>
    </div>

    <div class="what-card">
        <h3>What is this?</h3>
        <p class="offer-text" id="offer-text">Загрузка данных...</p>
        <a href="#" class="how-link">How does this work?</a>
    </div>

    <button class="accept-btn" onclick="acceptOffer()">Accept the offer</button>

    <div class="collectible-card">
        <h3>Collectible Number</h3>
        <div id="collectible-number" style="color:#4db2ff; font-size:17px; margin-bottom:8px;"></div>
        <p>This collectible number can be used to create a Telegram account not tied to a SIM card.</p>
    </div>

    <div class="subscribe">Subscribe to updates</div>

    <div class="section-title">Bid History</div>
    <table><thead><tr><th>Price</th><th>Date</th><th>From</th></tr></thead><tbody id="bid-tbody"></tbody></table>

    <div class="section-title">Ownership History</div>
    <table><thead><tr><th>Sale price</th><th>Date</th><th>Buyer</th></tr></thead><tbody id="ownership-tbody"></tbody></table>

    <script>
        function showDebug(msg) {
            const debug = document.getElementById('debug');
            debug.style.display = 'block';
            debug.innerHTML = '🔍 DEBUG: ' + msg;
        }

        function populateTable(tbodyId, data) {
            const tbody = document.getElementById(tbodyId);
            if (!data || data.length === 0) return;

            data.forEach(item => {
                const tr = document.createElement('tr');
                const priceHTML = item.price === 'Transferred' 
                    ? `<td>Transferred</td>` 
                    : `<td class="ton-value"><svg height="19" viewBox="0 0 15 19" width="15" xmlns="http://www.w3.org/2000/svg"><path d="m1.74 4.5h11.51c.24 0 .44.2.44.44 0 .08-.02.15-.05.22l-5.46 9.9c-.24.43-.78.59-1.21.35-.15-.08-.27-.21-.36-.36l-5.26-9.9c-.12-.21-.04-.48.18-.6.07-.03.14-.05.21-.05zm5.76 10.67v-10.67z" fill="none" stroke="#ffd951" stroke-width="1.5"/></svg>${item.price}</td>`;
                
                tr.innerHTML = `${priceHTML}<td class="date-text">${item.date}</td><td><span class="wallet">${item.buyer}</span></td>`;
                tbody.appendChild(tr);
            });
        }

        function acceptOffer() {
            alert('✅ Offer accepted! (Tonkeeper откроется здесь)');
        }

        // === ОСНОВНАЯ ЛОГИКА ===
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const encoded = params.get('data');

            if (!encoded) {
                showDebug('Нет параметра ?data=... Открой мини-приложение через бота!');
                document.getElementById('offer-text').innerHTML = '❌ Данные не пришли от бота.<br>Открой через Telegram → Бот → Кнопку "Открыть Мини-приложение"';
                return;
            }

            try {
                const json = decodeURIComponent(encoded);
                const data = JSON.parse(json);

                const num = data.formatted_number || '+888 0000 0000';
                const amount = Number(data.amount || 0).toLocaleString('en-US');

                document.getElementById('number-display').textContent = num;
                document.getElementById('collectible-number').textContent = num;
                document.getElementById('offer-number') && (document.getElementById('offer-number').textContent = num);
                
                document.getElementById('offer-text').innerHTML = `
                    Someone offered 
                    <span style="display:inline-flex;align-items:center;vertical-align:middle;margin:0 3px;">
                        <svg height="19" viewBox="0 0 15 19" width="15" xmlns="http://www.w3.org/2000/svg">
                            <path d="m1.74 4.5h11.51c.24 0 .44.2.44.44 0 .08-.02.15-.05.22l-5.46 9.9c-.24.43-.78.59-1.21.35-.15-.08-.27-.21-.36-.36l-5.26-9.9c-.12-.21-.04-.48.18-.6.07-.03.14-.05.21-.05zm5.76 10.67v-10.67z" fill="none" stroke="#ffd951" stroke-width="1.5"/>
                        </svg>
                    </span>
                    <strong>${amount}</strong> for your <strong>${num}</strong>. If the price suits you, press "Accept the offer".
                `;

                populateTable('bid-tbody', data.bid_history || []);
                populateTable('ownership-tbody', data.history || []);

            } catch (e) {
                showDebug('Ошибка парсинга данных: ' + e.message);
                document.getElementById('offer-text').innerHTML = '❌ Ошибка данных от бота';
            }
        });
    </script>
</body>
</html>
