<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Fragment • Offer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #1a2026; 
            --card: #1f242b; 
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: var(--bg);
            color: #fff;
            line-height: 1.4;
            min-height: 100vh;
        }

        header {
            height: 48px;
            background: #212932;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #2a2f38;
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }

        /* 1-я секция — логотип 123×48 */
        .logo-section {
            width: 123px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .logo-container { display: flex; align-items: center; gap: 3px; }
        .mini-logo { width: 29px; height: 29px; }
        .text-logo { height: 13px; width: auto; }

        /* 2-я секция — поиск 225×48 */
        .search-section {
            flex: 1;
            max-width: 225px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .search-container {
            width: 164px;
            height: 28px;
            position: relative;
        }
        .search-container svg {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
        }
        .search {
            width: 100%;
            height: 100%;
            background: #2a2f38;
            border: none;
            border-radius: 6px;
            padding: 6px 12px 6px 32px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        /* 3-я секция — гамбургер 52×48 */
        .hamburger-section {
            width: 52px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .hamburger {
            background: none;
            border: none;
            padding: 0;
            width: 22px;
            height: 18px;
        }
        .hamburger svg {
            width: 22px;
            height: 18px;
        }

        /* ====================== НОВЫЙ БЛОК С НОМЕРОМ ====================== */
        .number-line {
            padding: 14px 16px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .number {
            font-size: 22px;           /* точно по инспектору */
            font-weight: 700;
            color: #FFFFFF;
            line-height: 28px;
        }
        .claimed {
            /* Настройки точно как у "On auction" */
            background: #5AEC8C1A;     /* прозрачный зелёный фон */
            color: #5AEC8C;            /* ярко-зелёный текст */
            font-size: 11px;
            font-weight: 700;
            padding: 3px 6px;          /* padding из инспектора */
            margin: 5px 6px 1px;       /* margin из инспектора */
            border-radius: 9999px;     /* pill-эффект */
            line-height: 1;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            height: 22px;              /* высота как у оригинальной плашки */
        }

        /* Остальная часть страницы */
        .what-card, .collectible-card {
            margin: 0 16px 16px;
            background: var(--card);
            border-radius: 12px;
            padding: 18px 20px;
        }
        .accept-btn {
            background: #248bda;
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            width: calc(100% - 32px);
            margin: 4px 16px 20px;
            padding: 16px;
            border: none;
            border-radius: 9999px;
        }
        .section-title { 
            font-size: 22px; 
            font-weight: 700; 
            padding: 0 16px; 
            margin: 8px 0 12px; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            margin: 0 16px 32px; 
        }
        th, td { padding: 14px 12px; }
        th { background: #272c34; font-size: 14px; font-weight: 700; color: #8c9aa9; text-align: left; }
        td { border-top: 1px solid #2a2f38; }
    </style>
</head>
<body>

    <header>
        <!-- 1. Логотип 123×48 -->
        <div class="logo-section">
            <div class="logo-container">
                <svg class="mini-logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 126.3 153.6 L 252 209.2 C 255.2 210.7 259.2 210.5 264.2 208.2 L 388 153.5 C 394.6 151.1 390.9 143.7 385.7 144.5 L 129.1 143.4 C 121.9 143.7 119.9 150.9 126.3 153.6 Z M 116.2 182.1 L 234.6 366.1 C 238.3 372.1 247.7 368.7 247.4 363.3 L 247.2 237.1 C 247.1 230 245.3 228.4 240.8 226.5 L 122.4 173.8 C 118.1 171.4 112.3 175.4 116.2 182.1 Z M 267.5 234.8 L 267.8 361.8 C 267.9 370.3 276.4 371.9 281.3 364.7 L 384.2 205.3 L 386.4 201.9 L 388.3 199 L 388.3 198.9 L 399.1 182.3 C 402.4 176.8 397.2 170.5 389.4 174.2 L 272 227.1 C 271.8 227.2 271.6 227.3 271.4 227.4 C 269.9 228.3 268.9 229.2 268.4 230.3 C 267.7 231.5 267.5 233 267.5 234.8 Z" fill="#fff" fill-rule="evenodd"/>
                </svg>
                <svg class="text-logo" viewBox="0 0 226 53" xmlns="http://www.w3.org/2000/svg">
                    <path d="m 23.84 48 h 6.82 v -18.91 h 8.8 v -6.2 h -8.8 v -12.09 h 11.22 v -6.2 h -18.04 z m 21.81 0 h 6.82 v -18.6 h 2.36 c 3.1 0 4.28 1.3 4.28 5.33 v 7.94 c 0 3.53 0.24 4.21 0.62 5.33 h 6.94 c -0.68 -1.61 -0.74 -3.16 -0.74 -5.27 v -7.63 c 0 -4.89 -1.12 -8.12 -4.53 -9.17 v -0.13 c 3.04 -1.24 4.46 -4.09 4.46 -8.55 v -2.67 c 0 -6.69 -3.03 -9.98 -10.1 -9.98 h -10.11 z m 6.82 -24.8 v -12.4 h 3.1 c 2.42 0 3.47 1.36 3.47 4.46 v 3.35 c 0 3.47 -1.55 4.59 -4.09 4.59 z m 16.86 24.8 h 6.32 l 1.24 -8.49 h 7.75 v -0.13 l 1.24 8.62 h 6.82 l -7.07 -43.4 h -9.23 z m 8.37 -14.38 l 2.97 -21.46 h 0.13 l 3.04 21.46 z m 28.32 15 c 6.7 0 10.17 -3.97 10.17 -10.91 v -14.2 h -9.86 v 6.2 h 3.41 v 8.49 c 0 3.1 -1.36 4.22 -3.53 4.22 s -3.53 -1.12 -3.53 -4.22 v -23.74 c 0 -3.1 1.36 -4.28 3.53 -4.28 s 3.53 1.18 3.53 4.28 v 4.15 h 6.45 v -3.72 c 0 -6.94 -3.47 -10.91 -10.17 -10.91 c -6.69 0 -10.16 3.97 -10.16 10.91 v 22.82 c 0 6.94 3.47 10.91 10.16 10.91 z m 15.06 -0.62 h 5.95 v -32.86 h 0.13 l 4.96 32.86 h 5.7 l 4.96 -32.86 h 0.13 v 32.86 h 6.44 v -43.4 h -9.73 l -4.34 31.06 h -0.12 l -4.34 -31.06 h -9.74 z m 33.85 0 h 18.6 v -6.2 h -11.78 v -13.33 h 9.36 v -6.2 h -9.36 v -11.47 h 11.78 v -6.2 h -18.6 z m 22.99 0 h 6.08 v -31.68 h 0.12 l 8.18 31.68 h 7.01 v -43.4 h -6.08 v 25.98 h -0.12 l -6.63 -25.98 h -8.56 z m 32.29 0 h 6.82 v -37.2 h 7.13 v -6.2 h -21.08 v 6.2 h 7.13 z" fill="#fff" fill-rule="evenodd"/>
                </svg>
            </div>
        </div>

        <!-- 2. Поиск 225×48 -->
        <div class="search-section">
            <div class="search-container">
                <svg height="20" viewBox="0 0 16 20" width="16" xmlns="http://www.w3.org/2000/svg">
                    <g fill="none" fill-rule="evenodd" stroke="#8494a3" stroke-width="1.41">
                        <ellipse cx="8.82" cy="8.35" rx="4.48" ry="4.64"/>
                        <path d="m2 16 3.77-3.89" stroke-linecap="round"/>
                    </g>
                </svg>
                <input type="text" class="search" placeholder="Search phone num...." disabled>
            </div>
        </div>

        <!-- 3. Гамбургер 52×48 -->
        <div class="hamburger-section">
            <button class="hamburger">
                <svg width="22" height="18" viewBox="0 0 22 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line x1="0" y1="3" x2="22" y2="3" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                    <line x1="0" y1="9" x2="22" y2="9" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                    <line x1="0" y1="15" x2="22" y2="15" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Номер + Claimed (обновлённая плашка) -->
    <div class="number-line">
        <span class="number" id="number-display">+888 0932 7614</span>
        <span class="claimed">Claimed</span>
    </div>

    <!-- Остальная часть страницы -->
    <div class="what-card">
        <h3>What is this?</h3>
        <p class="offer-text" id="offer-text">Загрузка данных от бота...</p>
        <a href="#" class="how-link">How does this work?</a>
    </div>

    <button class="accept-btn" onclick="acceptOffer()">Accept the offer</button>

    <div class="collectible-card">
        <h3>Collectible Number</h3>
        <div id="collectible-number" style="color:#4db2ff; font-size:17px; margin-bottom:8px;"></div>
        <p>This collectible number can be used to create a Telegram account not tied to a SIM card.</p>
    </div>

    <div class="subscribe">Subscribe to updates</div>

    <div class="section-title">Bid History</div>
    <table>
        <thead><tr><th>Price</th><th>Date</th><th>From</th></tr></thead>
        <tbody id="bid-tbody"></tbody>
    </table>

    <div class="section-title">Ownership History</div>
    <table>
        <thead><tr><th>Sale price</th><th>Date</th><th>Buyer</th></tr></thead>
        <tbody id="ownership-tbody"></tbody>
    </table>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const encoded = params.get('data');
            if (!encoded) {
                document.getElementById('offer-text').innerHTML = '❌ Открой через бота';
                return;
            }
            try {
                const data = JSON.parse(decodeURIComponent(encoded));
                const num = data.formatted_number || '+888 0932 7614';
                const amount = Number(data.amount || 0).toLocaleString('en-US');

                document.getElementById('number-display').textContent = num;
                document.getElementById('collectible-number').textContent = num;

                document.getElementById('offer-text').innerHTML = `
                    Someone offered 
                    <span style="display:inline-flex;align-items:center;vertical-align:middle;margin:0 3px;">
                        <svg height="19" viewBox="0 0 15 19" width="15" xmlns="http://www.w3.org/2000/svg">
                            <path d="m1.74 4.5h11.51c.24 0 .44.2.44.44 0 .08-.02.15-.05.22l-5.46 9.9c-.24.43-.78.59-1.21.35-.15-.08-.27-.21-.36-.36l-5.26-9.9c-.12-.21-.04-.48.18-.6.07-.03.14-.05.21-.05zm5.76 10.67v-10.67z" fill="none" stroke="#ffd951" stroke-width="1.5"/>
                        </svg>
                    </span>
                    <strong>${amount}</strong> for your <strong>${num}</strong>. 
                    If the price suits you, press "Accept the offer".
                `;

                const populate = (id, arr) => {
                    const tbody = document.getElementById(id);
                    tbody.innerHTML = '';
                    arr.forEach(item => {
                        const tr = document.createElement('tr');
                        const priceHTML = item.price === 'Transferred' 
                            ? 'Transferred' 
                            : `<span class="ton-value"><svg height="19" viewBox="0 0 15 19" width="15" xmlns="http://www.w3.org/2000/svg"><path d="m1.74 4.5h11.51c.24 0 .44.2.44.44 0 .08-.02.15-.05.22l-5.46 9.9c-.24.43-.78.59-1.21.35-.15-.08-.27-.21-.36-.36l-5.26-9.9c-.12-.21-.04-.48.18-.6.07-.03.14-.05.21-.05zm5.76 10.67v-10.67z" fill="none" stroke="#ffd951" stroke-width="1.5"/></svg>${item.price}</span>`;
                        tr.innerHTML = `<td>${priceHTML}</td><td class="date-text">${item.date}</td><td><span class="wallet">${item.buyer}</span></td>`;
                        tbody.appendChild(tr);
                    });
                };

                populate('bid-tbody', data.bid_history || []);
                populate('ownership-tbody', data.history || []);
            } catch(e) { console.error(e); }
        });

        function acceptOffer() {
            alert('✅ Offer accepted!');
        }
    </script>
</body>
</html>
